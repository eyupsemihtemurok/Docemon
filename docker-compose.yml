services:
  hackathon26-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hackathon26-sql
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=commitbirlikleri_hackathon26!
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'commitbirlikleri_hackathon26!' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  hackathon26-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hackathon26-backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=hackathon26-sql
      - DB_PORT=1433
      - DB_USER=sa
      - DB_PASSWORD=commitbirlikleri_hackathon26!
      - DB_NAME=master
      - NODE_ENV=production
    depends_on:
      hackathon26-sql:
        condition: service_healthy
    restart: always

  hackathon26-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hackathon26-frontend
    ports:
      - "19006:19006"
    environment:
      - API_URL=http://localhost:3000
    depends_on:
      - hackathon26-backend

  hackathon26-info:
    image: alpine
    container_name: hackathon26-info
    depends_on:
      - hackathon26-backend
      - hackathon26-frontend
    command: >
      sh -c "echo ' ' &&
             echo '================================================' &&
             echo '🚀 hackathon26 PROJESİ BAŞARIYLA BAŞLATILDI!' &&
             echo '================================================' &&
             echo ' ' &&
             echo '🌐 Frontend (Web): http://localhost:19006' &&
             echo '⚙️  Backend (API):  http://localhost:3000' &&
             echo '💾 MSSQL Server:   localhost:1433' &&
             echo '================================================' &&
             echo ' '"

volumes:
  mssql_data:
