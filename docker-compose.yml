services:
  hackathon26-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hackathon26-sql
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=commitbirlikleri_hackathon26!
    volumes:
      - mssql_data:/var/opt/mssql

  hackathon26-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hackathon26-backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=hackathon26-sql
      - DB_USER=commitbirlikleri
      - DB_PASSWORD=commitbirlikleri_hackathon26!
    depends_on:
      - hackathon26-sql

  hackathon26-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hackathon26-frontend
    ports:
      - "19006:19006" # Expo Web portu
    environment:
      - API_URL=http://localhost:3000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run web

  hackathon26-frontend-mobile:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hackathon26-frontend-mobile
    ports:
      - "8081:8081"   # Metro
      - "19000:19000" # Expo Go
      - "19001:19001" # Expo DevTools
    environment:
      - API_URL=http://localhost:3000
      - REACT_NATIVE_PACKAGER_HOSTNAME=${EXPO_HOST_IP:-192.168.125.171}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run mobile
    stdin_open: true
    tty: true

  hackathon26-info:
    image: alpine
    container_name: hackathon26-info
    depends_on:
      - hackathon26-backend
      - hackathon26-frontend
      - hackathon26-frontend-mobile
    command: >
      sh -c "echo ' ' &&
             echo '================================================' &&
             echo '🚀 hackathon26 PROJESİ BAŞARIYLA BAŞLATILDI!' &&
             echo '================================================' &&
             echo ' ' &&
             echo '🌐 Frontend (Web): http://localhost:19006' &&
             echo '📱 Expo Go:      Docker loglarinda tunnel QR/URL' &&
             echo '⚙️  Backend (API):  http://localhost:3000' &&
             echo '💾 MSSQL Server:   localhost:1433' &&
             echo '================================================' &&
             echo ' '"

volumes:
  mssql_data:
