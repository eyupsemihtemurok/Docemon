services:
  hackathon26-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hackathon26-sql
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=commitbirlikleri_hackathon26!
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "commitbirlikleri_hackathon26!", "-C", "-Q", "SELECT 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  hackathon26-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hackathon26-backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=hackathon26-sql
      - DB_PORT=1433
      - DB_USER=sa
      - DB_PASSWORD=commitbirlikleri_hackathon26!
      - DB_NAME=hackathon26
      - NODE_ENV=production
      - HASH_SALT=hackathon26_secret_salt_key
      - JWT_SECRET=hackathon26_super_secret_jwt_key
    depends_on:
      hackathon26-sql:
        condition: service_healthy
    restart: always

  hackathon26-faceservice:
    build:
      context: ./face-service
      dockerfile: Dockerfile
    container_name: hackathon26-faceservice
    ports:
      - "8000:8000"
    environment:
      - DEEPFACE_HOME=/app/.deepface
    volumes:
      - ./face-service/.deepface:/app/.deepface
    restart: always

  hackathon26-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hackathon26-frontend
    ports:
      - "8081:8081"
      - "19006:19006"
    environment:
      - API_URL=${API_URL}
      - EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL}
      - NODE_ENV=${FRONTEND_NODE_ENV}
      - REACT_NATIVE_PACKAGER_HOSTNAME=${REACT_NATIVE_PACKAGER_HOSTNAME}
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
      - EXPO_USE_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - hackathon26-backend
    stdin_open: true
    tty: true
    restart: always
    command: npx expo start --port 8081

volumes:
  mssql_data:
